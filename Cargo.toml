[workspace]
members = ["runner", "test-common", "program-common", "tests/*"]
resolver = "2"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
pinocchio = "0.10.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
solana-address = { version = "2.3.0", features = ["decode"] }
solana-client = "3"
solana-instruction = "3"
solana-keypair = "3"
solana-message = "3"
solana-program = "3"
solana-program-log = "1"
solana-pubkey = "3"
solana-signature = "3"
solana-signer = "3"
solana-system-interface = "3"
solana-sysvar = "3"
solana-transaction = "3"
tokio = { version = "1", features = ["full"] }
